        <script>
            // Adicione um evento de clique no checkbox
            document.addEventListener('DOMContentLoaded', function () {
                var checkbox = document.getElementById('nav-check');
                var body = document.body;
                checkbox.addEventListener('change', function () {
                    if (checkbox.checked) {
                        // Quando o checkbox estiver marcado, adicione a classe scroll-lock ao body
                        body.classList.add('scroll-lock');
                    } else {
                        // Quando o checkbox não estiver marcado, remova a classe scroll-lock do body
                        body.classList.remove('scroll-lock');
                    }
                });
            });
        </script>

    <head>
        <meta charset="UTF-8">

        <title>Mapa de Acidente de Trânsito</title>
        <link rel="stylesheet" href="css/theme.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet.pm/dist/leaflet.pm.css" />
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="https://rawgit.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>
        <script src="https://unpkg.com/leaflet.pm/dist/leaflet.pm.min.js"></script>
        <script src="js/Croqui.js" defer></script>
    </head>
    <body>
        <div id="progress-container">
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div class="step-indicators">
                <div id="circle1" class="step-circle active" onclick="nextStep(1)">1</div>
                <div id="circle2" class="step-circle" onclick="nextStep(2)">2</div>
                <div id="circle3" class="step-circle" onclick="nextStep(3)">3</div>
            </div>
        </div>

        <div id="step1" class="step">
            <h2>Passo 1: Selecionar o Local do Mapa</h2>
        </div>
        <div id="step2" class="step">
            <h2>Passo 2: Posicionar os Objetos</h2>
            <div id="marker-controls" class="controls">
                <button onclick="addMarker('veiculo')">Veículo</button>
                <button onclick="addMarker('moto')">Moto/Bicicleta</button>
                <button onclick="addMarker('onibus')">Ônibus</button>
                <button onclick="addMarker('caminhao')">Caminhão</button>
                <button onclick="addMarker('carroça')">Carroça</button>
                <button onclick="addMarker('carroça-tombada')">Carroça Tombada</button>
                <button onclick="addMarker('veiculo-capotado')">Veículo Capotado</button>
                <button onclick="addMarker('veiculo-tombado')">Veículo Tombado</button>
            </div>
        </div>
        <div id="step3" class="step">
            <h2>Passo 3: Capturar Imagem</h2>
            <button onclick="captureMap()">Salvar</button>
        </div>
        <br>
        <div id="map-container">
            <div id="map"></div>
            <div id="controls-container"></div>

        </div>
    </body>
